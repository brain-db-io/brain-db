# Brain — single-host Docker Compose stack.
#
# Services:
#   brain           Brain substrate (Dockerfile in this directory)
#   prometheus      Scrapes brain on :9091/metrics; loads alert rules from config/monitoring/alerts/
#   otel-collector  Receives OTLP/HTTP traces from brain; debug exporter by default
#   grafana         Auto-provisioned with Prometheus datasource and the dashboards under config/monitoring/dashboards/
#
# Bring up:    docker compose up -d
# Bring down:  docker compose down            # keeps volumes
# Wipe:        docker compose down -v         # also drops data volumes
#
# Port map (host → container):
#   8080  → brain          data plane (clients + SDK)
#   9091  → brain          public HTTP (/healthz + /metrics)
#   9090  → prometheus     UI
#   3000  → grafana        UI (anonymous viewer enabled; admin / admin password = brain)
#   4318  → otel-collector OTLP/HTTP receiver (for sending traces from other services too)
#
# Brain's admin endpoint (/v1/*) listens on 127.0.0.1:9092 inside the
# container and is intentionally not published. Reach it from another
# container via the HTTP surface directly, or via the external CLI
# package (brain-db-io repo). v1 has no built-in auth on /v1/* — keep
# this loopback or front with mTLS / a token-checking proxy if you must
# expose it.

name: brain

services:
  brain:
    build:
      context: .
      dockerfile: Dockerfile
    image: brain:latest
    container_name: brain
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9091:9091"
    environment:
      # Send traces to the in-stack collector. Override
      # BRAIN__TRACING__ENDPOINT for a real backend.
      BRAIN__TRACING__ENABLED: "true"
      BRAIN__TRACING__SAMPLER: "ratio"
      BRAIN__TRACING__SAMPLE_RATIO: "0.1"
      BRAIN__TRACING__ENDPOINT: "http://otel-collector:4318/v1/traces"
      BRAIN__TRACING__SERVICE_NAME: "brain-server"
      RUST_BACKTRACE: "1"
    volumes:
      - brain-data:/var/lib/brain/data
      - brain-models:/var/lib/brain/models
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9091/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 3
    # Brain depends on io_uring. Linux hosts: this works out of the
    # box. macOS / Windows hosts: OrbStack / Docker Desktop's VM is
    # a Linux kernel >= 5.15 so io_uring is available.
    ulimits:
      memlock: -1

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: brain-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/monitoring/alerts:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    depends_on:
      brain:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: brain-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./deploy/compose/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4318:4318"
      - "13133:13133"

  grafana:
    image: grafana/grafana:11.3.1
    container_name: brain-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: brain
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./deploy/compose/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ./deploy/compose/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/brain.yaml:ro
      - ./config/monitoring/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  brain-data:
  brain-models:
  prometheus-data:
  grafana-data:
