name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Skill conventions lint
        run: ./scripts/check-skills.sh

      - name: Build (workspace)
        run: cargo build --workspace --all-targets

      - name: Test (workspace)
        run: cargo test --workspace --all-targets

      - name: Doc tests
        run: cargo test --workspace --doc

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo doc (warnings as errors)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  miri:
    name: Miri (storage layer)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Miri test
        # Only run on the storage crate where unsafe lives.
        # Skip if the crate doesn't exist yet.
        run: |
          if [ -d "crates/brain-storage" ]; then
            cargo +nightly miri test -p brain-storage
          else
            echo "brain-storage not yet present; skipping miri."
          fi

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit
