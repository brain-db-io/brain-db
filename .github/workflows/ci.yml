name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt in to Node.js 24 for JavaScript actions ahead of GitHub's forced
  # cutover on 2026-06-02. Removes the deprecation warning from each job.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Skill conventions lint
        run: ./.claude/scripts/check-skills.sh

      - name: Build (workspace)
        run: cargo build --workspace --all-targets

      # Sequential link (`-j 1`) — the workspace's release-shaped link
      # graph OOMs the 7 GB GitHub Actions runner when N test binaries
      # link in parallel. `--no-fail-fast` so a single crate's red test
      # doesn't mask regressions in unrelated crates.
      - name: Test (workspace, sequential link)
        run: cargo test --workspace --all-targets --no-fail-fast -j 1

      - name: Doc tests
        run: cargo test --workspace --doc

      - name: Clippy
        run: cargo clippy --workspace --tests --all-features -- -D warnings

      - name: Cargo doc (warnings as errors)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

      # Smoke-asserts the shipped binaries link in release mode. Catches
      # regressions where a debug-only path masks a release-only failure
      # (LTO / codegen-units=1 / panic=abort interactions).
      - name: Release build smoke (brain-server)
        run: cargo build --release --bin brain-server

  miri:
    name: Miri (storage layer)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Miri test
        # Only run on the storage crate where unsafe lives.
        # Skip if the crate doesn't exist yet.
        run: |
          if [ -d "crates/brain-storage" ]; then
            cargo +nightly miri test -p brain-storage
          else
            echo "brain-storage not yet present; skipping miri."
          fi

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit
