name: CI

on:
  push:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Opt in to Node.js 24 for JavaScript actions ahead of GitHub's forced
  # cutover on 2026-06-02. Removes the deprecation warning from each job.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build (workspace)
        run: cargo build --workspace --all-targets

      # Run tests only (--lib --bins --tests), NOT benches: criterion bench
      # harnesses reject `--test-threads` and are operator-run perf tools, not
      # CI gates (they stay compile-checked by the build step's --all-targets).
      # Sequential link (`-j 1`) — the release-shaped link graph OOMs the 7 GB
      # runner when N test binaries link in parallel. `--test-threads=1` keeps
      # RUNTIME memory bounded: brain-server integration tests each spin up a
      # shard + load the embedding model, and running them in parallel within a
      # binary SIGKILLs the runner. `--no-fail-fast` so one crate's red test
      # doesn't mask regressions elsewhere.
      - name: Test (workspace, sequential link)
        run: cargo test --workspace --lib --bins --tests --no-fail-fast -j 1 -- --test-threads=1

      - name: Doc tests
        run: cargo test --workspace --doc

      - name: Clippy
        run: cargo clippy --workspace --tests --all-features -- -D warnings

      - name: Cargo doc (warnings as errors)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

      # Smoke-asserts the shipped binaries link in release mode. Catches
      # regressions where a debug-only path masks a release-only failure
      # (LTO / codegen-units=1 / panic=abort interactions).
      - name: Release build smoke (brain-server)
        run: cargo build --release --bin brain-server

  miri:
    name: Miri (storage layer)
    runs-on: ubuntu-latest
    env:
      # The byte-logic tests miri DOES run (slot/payload) use proptest, which
      # calls getcwd for its failure-persistence file; default miri isolation
      # blocks that. Disable isolation so getcwd/fs/timers work — miri still
      # checks UB. The mmap/WAL modules miri genuinely can't model stay gated
      # behind #[cfg(all(test, not(miri)))].
      MIRIFLAGS: -Zmiri-disable-isolation
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Miri test
        # --lib only: miri checks the unsafe byte-logic units (slot/record/
        # payload layout + CRC). The integration tests (tests/*.rs) drive real
        # arena/WAL file I/O (mmap, fallocate) that miri cannot model; they're
        # covered by the normal Test job. Skip if the crate doesn't exist yet.
        run: |
          if [ -d "crates/brain-storage" ]; then
            cargo +nightly miri test -p brain-storage --lib
          else
            echo "brain-storage not yet present; skipping miri."
          fi

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit
