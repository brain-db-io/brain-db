# Brain — development configuration.
# This file is read by `brain-server --config config/dev.toml`.
# Schema is defined in spec/01_system_architecture/.

[server]
listen_addr = "127.0.0.1:9090"
metrics_addr = "127.0.0.1:9091"
admin_addr = "127.0.0.1:9092"

[storage]
data_dir = "./data"
shard_count = 4

[shard]
arena_capacity_bytes = "1GiB"
wal_segment_size_bytes = "256MiB"
wal_retention_segments = 4

[hnsw]
m = 16
ef_construction = 200
ef_search = 64

[embedder]
model = "bge-small-en-v1.5"
cache_size = 10000
batch_size = 32
batch_window_ms = 5

[workers]
decay_interval_sec = 3600
consolidation_interval_sec = 600
hnsw_maintenance_interval_sec = 1800
idempotency_cleanup_interval_sec = 3600
slot_reclamation_interval_sec = 3600
wal_retention_interval_sec = 600
edge_scrub_interval_sec = 86400
counter_reconciliation_interval_sec = 86400
statistics_update_interval_sec = 60
embedder_cache_eviction_interval_sec = 300
snapshot_interval_sec = 21600

# Phase B: per-shard AutoEdgeWorker. Drains the writer's post-encode
# channel and writes `SimilarTo` edges between memories whose cosine
# similarity is at least `similarity_threshold`. Every field below
# defaults if the section is omitted; tune per deployment.
[workers.auto_edge]
# Master switch. Set to false to disable auto-edge derivation entirely
# (no worker, no channel, no overhead).
enabled = true
# Scheduler tick. Smaller = faster encode → edge visibility; larger =
# less worker CPU. 100 ms is the substrate latency-budget default.
interval_ms = 100
# Max memories drained per cycle. Caps HNSW search bursts.
batch_size = 256
# Cosine floor. Neighbours below this don't get an edge.
similarity_threshold = 0.85
# Neighbour count per memory (worker over-fetches by 1 to skip self).
top_k = 5
# HNSW `ef` override for the per-encode search.
ef_search = 64
# Writer→worker queue depth. Overflow drops the enqueue with a warn
# (the encode itself never fails).
channel_capacity = 1024

# Phase E: per-shard ExtractorWorker. Drains the writer's post-encode
# channel and runs the three-tier extractor pipeline (pattern + classifier
# + LLM) against each memory's text. Outputs are resolved through the
# entity resolver gauntlet and written as entities / statements /
# relations / mention edges.
[workers.extractor]
# Master switch. `false` skips registration entirely — no channel, no
# worker, encodes see a None sender.
enabled = true
# Scheduler tick. Extraction is heavier than auto-edge (LLM round-trip
# dominates), so the default is 1s vs 100ms.
interval_ms = 1000
# Max memories drained per cycle. Caps pattern/classifier/LLM work per
# tick.
drain_per_cycle = 32
# Per-cycle LLM cost ceiling in dollar-micro-units (1e-6 USD). The
# framework's per-call CostBudget is the active enforcement surface in
# v1; per-cycle accounting wires through here in a later iteration.
llm_budget_per_cycle_micro_usd = 50000
# Writer→worker queue depth. Overflow drops with a warn.
channel_capacity = 1024
# Skip memories that already have a pipeline audit row. Set to false
# only for re-extraction backfill scenarios.
skip_already_extracted = true

# Phase T: per-shard TemporalEdgeWorker. Drains the writer's post-encode
# channel and writes `FollowedBy` edges from the agent's previous memory
# in the same context within `window_seconds`. Linear decay weight on
# the gap; asymmetric edges (no mirror).
[workers.temporal_edge]
# Master switch.
enabled = true
# Scheduler tick.
interval_ms = 100
# Max memories drained per cycle.
batch_size = 256
# Temporal window. Memories older than this are not candidates.
window_seconds = 300
# Hard floor on the decay-weight curve.
weight_min = 0.1
# Writer→worker queue depth.
channel_capacity = 1024
# Allow FollowedBy edges across context boundaries.
cross_context = false

# Phase C: per-shard CausalEdgeWorker. Drains the ExtractorWorker's post-
# commit channel and writes `Caused` edges from cause-side memories to
# effect-side memories, anchored on extractor-asserted causal statements
# (`brain:caused_by`, `brain:triggered`, …). Worker still spawns on
# substrate-only deployments but resolves an empty predicate whitelist
# and no-ops.
[workers.causal_edge]
# Master switch.
enabled = true
# Scheduler tick.
interval_ms = 200
# Max statements drained per cycle.
batch_size = 64
# Minimum statement confidence. Below this, no edge.
min_confidence = 0.6
# Predicate qnames whose presence triggers causal-edge derivation.
whitelist_qnames = [
    "brain:caused_by",
    "brain:triggered",
    "brain:led_to",
    "brain:resulted_in",
    "brain:because_of",
]
# Per-statement caps on edge fan-out.
max_effect_memories_per_statement = 3
max_cause_memories_per_statement = 3
max_related_statements_per_entity = 5
# Extractor→worker queue depth.
channel_capacity = 1024

[logging]
level = "info"
output = "stdout"
format = "json"

[tracing]
enabled = false
sampler = "ratio"
sample_ratio = 0.01

[auth]
# Dev mode: no auth. Set this for production.
mode = "none"

[summarizer]
# Sub-task 9.15. Consolidation worker stays a no-op until an LLM
# backend is wired. Set to "openai" (build with --features
# summarizer-openai) or "ollama" (--features summarizer-ollama).
backend = "disabled"
request_timeout_sec = 30
max_summary_chars = 4096
# OpenAI knobs — only used when backend = "openai".
# openai_api_key_env = "OPENAI_API_KEY"
# openai_model = "gpt-4o-mini"
# Ollama knobs — only used when backend = "ollama".
# ollama_base = "http://localhost:11434"
# ollama_model = "llama3.1:8b"
