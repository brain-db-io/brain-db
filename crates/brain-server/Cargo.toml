[package]
name = "brain-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "The Brain cognitive substrate server."

[[bin]]
name = "brain-server"
path = "src/main.rs"

[dependencies]
# Brain crate dependencies are added in later Phase 9 sub-tasks as each one
# is wired in (e.g. 9.4 shards → brain-storage; 9.5 metadata → brain-metadata,
# ...). Keeping the import set minimal so this crate compiles on non-Linux
# hosts during the pure-rust sub-tasks.
brain-core = { path = "../brain-core" }

anyhow.workspace = true
blake3.workspace = true
flume.workspace = true
parking_lot.workspace = true
serde.workspace = true
thiserror.workspace = true
toml.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true

# Glommio + brain-storage are Linux-only (io_uring, mmap, pwritev2). The
# shard module is cfg-gated so this crate still compiles on macOS / Windows
# for non-shard work (config, routing).
[target.'cfg(target_os = "linux")'.dependencies]
glommio.workspace = true
brain-storage = { path = "../brain-storage" }

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "time"] }
