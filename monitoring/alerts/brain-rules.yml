# Brain — Prometheus alert rules per spec §14/05.
#
# Loaded by Prometheus / Alertmanager. For Prometheus-Operator
# deployments, wrap in a `PrometheusRule` CRD (the file structure is
# the same).
#
# Severity convention (spec §14/05 §2):
#   critical — page; substrate down / data-loss-imminent.
#   high     — notify within hours; sustained errors, degraded perf.
#   medium   — review within day.
#   low      — informational.
#
# Some rules reference metric families that 12.1c didn't ship yet
# (HNSW counters, embedder duration, metadata checkpoint timestamp,
# disk free). Those alerts stay no-ops in Prometheus until the
# underlying primitive lands. The rule file is the spec contract;
# the runtime fills it in over time.

groups:
  # ---------------------------------------------------------------
  # CRITICAL — page immediately
  # ---------------------------------------------------------------
  - name: brain.critical
    interval: 30s
    rules:
      - alert: BrainSubstrateDown
        expr: brain_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Brain substrate is unreachable"
          description: |
            Brain server is reporting brain_up=0 for 1 minute. The
            /metrics endpoint is reachable but the substrate is
            signalling not-ready.
          runbook: "https://github.com/brain-db-io/brain-db/blob/main/docs/runbooks/substrate-down.md"

      - alert: BrainHighErrorRate
        expr: |
          sum(rate(brain_request_total{status="error"}[5m]))
          /
          clamp_min(sum(rate(brain_request_total[5m])), 0.001)
          > 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 10% sustained"
          description: |
            More than 10% of requests have been failing over the
            last 5 minutes. Investigate immediately.
          runbook: "https://github.com/brain-db-io/brain-db/blob/main/docs/runbooks/high-error-rate.md"

      - alert: BrainCheckpointFailing
        # Deferred metric: brain_metadata_last_checkpoint_unixtime.
        # Until 12/storage-stat-api lands this is a no-op (the
        # metric never appears so the alert never fires).
        expr: time() - brain_metadata_last_checkpoint_unixtime > 3600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No checkpoint completed in the last hour"
          description: |
            Recovery time grows with the WAL. A stuck checkpoint
            risks WAL retention pressure.

  # ---------------------------------------------------------------
  # HIGH — investigate within hours
  # ---------------------------------------------------------------
  - name: brain.high
    interval: 30s
    rules:
      - alert: BrainHighLatency
        expr: |
          histogram_quantile(
            0.99,
            sum by (op, le) (rate(brain_request_duration_ms_bucket[5m]))
          ) > 100
        for: 10m
        labels:
          severity: high
        annotations:
          summary: "p99 latency > 100 ms on {{ $labels.op }}"
          description: |
            Sustained p99 latency above the spec §16/02 budget for
            {{ $labels.op }}.

      - alert: BrainWorkerStuck
        expr: time() - brain_worker_last_run_unixtime > 7200
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Worker {{ $labels.worker }} hasn't run in 2 hours"
          description: |
            Worker {{ $labels.worker }} on shard {{ $labels.shard }}
            has not completed a cycle in the last 2 hours.

      - alert: BrainHighMemoryPressure
        expr: process_memory_resident_bytes > 8 * 1024 * 1024 * 1024
        for: 10m
        labels:
          severity: high
        annotations:
          summary: "Resident memory > 8 GiB"
          description: |
            Per-process RSS exceeds 8 GiB. Tune the threshold to
            your host's RAM budget (the rule is hard-coded because
            spec §14/05 §4 references node_memory_MemTotal_bytes
            which isn't emitted by brain-server itself).

      - alert: BrainOpenFdsHigh
        expr: process_open_fds > 5000
        for: 10m
        labels:
          severity: high
        annotations:
          summary: "Open file descriptor count > 5000"
          description: |
            Per-process fd count is high; check for connection
            leaks or stuck shard handles.

  # ---------------------------------------------------------------
  # MEDIUM — review within day
  # ---------------------------------------------------------------
  - name: brain.medium
    interval: 1m
    rules:
      - alert: BrainHighTombstoneRatio
        # Deferred: brain_hnsw_tombstone_ratio not yet emitted.
        expr: brain_hnsw_tombstone_ratio > 0.30
        for: 1h
        labels:
          severity: medium
        annotations:
          summary: "Tombstone ratio > 30% on shard {{ $labels.shard }}"
          description: |
            HNSW index is degraded. The hnsw_maintenance worker
            should rebuild — check why it isn't.

      - alert: BrainRecallQualityDegraded
        expr: brain_hnsw_recall_estimate < 0.85
        for: 30m
        labels:
          severity: medium
        annotations:
          summary: "Estimated recall < 85% on shard {{ $labels.shard }}"

      - alert: BrainEmbedderSlow
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (rate(brain_embedder_duration_ms_bucket[5m]))
          ) > 50
        for: 10m
        labels:
          severity: medium
        annotations:
          summary: "Embedder p99 > 50 ms"

      - alert: BrainConnectionsChurning
        expr: rate(brain_connections_total[5m]) > 100
        for: 30m
        labels:
          severity: medium
        annotations:
          summary: "Sustained accept rate > 100/s — possible client churn"
          description: |
            Many new connections per second over a sustained
            window suggests clients are reconnecting frequently.

  # ---------------------------------------------------------------
  # LOW — informational
  # ---------------------------------------------------------------
  - name: brain.low
    interval: 1m
    rules:
      - alert: BrainConfigChanged
        expr: changes(brain_config_info[1h]) > 0
        labels:
          severity: low
        annotations:
          summary: "brain-server config changed in the last hour"

      - alert: BrainWorkerErrorsWarning
        expr: rate(brain_worker_errors_total[1h]) > 0.01
        for: 1h
        labels:
          severity: low
        annotations:
          summary: "Worker {{ $labels.worker }} reporting low-rate errors"
